<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>愛之語：回憶日記 (終極優化版)</title>
    <style>
        :root { --primary: #ff85a1; --mind: #a29bfe; --gold: #ffd700; --bg-dark: #0f0c29; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "Microsoft JhengHei", sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; box-sizing: border-box; }

        /* --- 0. 共用按鈕與閃光特效 --- */
        .opt-btn { background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; text-align: left; margin: 5px 0; transition: 0.2s; backdrop-filter: blur(5px); }
        .opt-btn:hover { background: var(--primary); }
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; z-index: 9999; display: none; opacity: 0; transition: opacity 0.5s; pointer-events: none; }

        /* --- 1. 性別選擇 --- */
        #setup-screen { background: radial-gradient(circle, #302b63, #0f0c29); z-index: 200; flex-direction: column; align-items: center; justify-content: center; }

        /* --- 2. 3D 圓形全景樞紐 (改回暗黑原版) --- */
        #hub-screen { z-index: 10; background-color: #000; }
        #scene { width: 100vw; height: 100vh; perspective: 600px; overflow: hidden; position: relative; }
        #camera { position: absolute; top: 50%; left: 50%; width: 0; height: 0; transform-style: preserve-3d; }
        #world { position: absolute; top: 0; left: 0; width: 0; height: 0; transform-style: preserve-3d; }

        .wall { 
            position: absolute; width: 540px; height: 800px; left: -270px; top: -400px; 
            background: linear-gradient(to bottom, #0f0c29, #24243e 50%, #111); 
            border: 1px solid rgba(255, 133, 161, 0.1); backface-visibility: hidden; 
        }
        .floor, .ceiling { position: absolute; width: 2400px; height: 2400px; left: -1200px; top: -1200px; border-radius: 50%; }
        .floor { 
            transform: translateY(400px) rotateX(90deg); 
            background: radial-gradient(circle, transparent 20%, #050510 80%), 
                        linear-gradient(rgba(255, 133, 161, 0.15) 2px, transparent 2px), 
                        linear-gradient(90deg, rgba(255, 133, 161, 0.15) 2px, transparent 2px); 
            background-size: 100% 100%, 100px 100px, 100px 100px; 
            background-color: #050510; 
        }
        .ceiling { 
            transform: translateY(-400px) rotateX(-90deg); 
            background: radial-gradient(circle, #24243e, #0f0c29 80%); 
            box-shadow: 0 0 100px rgba(255, 133, 161, 0.2) inset; 
        }
        .center-glow { 
            position: absolute; width: 200px; height: 200px; left: -100px; top: -100px; 
            background: radial-gradient(circle, rgba(255,215,0,0.4), transparent 70%); 
            transform: translateY(398px) rotateX(90deg); border-radius: 50%; 
        }

        /* --- 實體門把與影像門板 --- */
        .door-frame { position: absolute; width: 180px; height: 420px; left: -90px; top: -210px; transform-style: preserve-3d; pointer-events: none; }
        .door-inside { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; box-shadow: 0 0 60px #fff; opacity: 0; transition: opacity 1s; border-radius: 10px 10px 0 0; }
        
        .door-flap { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box; 
            border: 3px solid var(--gold); border-radius: 10px 10px 0 0; 
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3) inset, 0 0 20px rgba(255, 215, 0, 0.5); 
            transform-origin: left center; transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.2s; 
            transform-style: preserve-3d; pointer-events: auto; cursor: pointer;
        }
        .door-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.65); border-radius: 6px 6px 0 0; z-index: 0; transition: background 0.3s;
        }
        .door-content {
            position: relative; z-index: 1; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--gold); font-weight: bold; font-size: 1.4rem; text-align: center; text-shadow: 0 0 10px var(--gold);
        }
        
        .door-flap:active .door-overlay { background: rgba(255, 133, 161, 0.4); }
        .door-flap.completed { opacity: 0.3; filter: grayscale(100%); pointer-events: none; border-color: #555; }

        /* UI 與全向搖桿 */
        #ui-layer { position: absolute; bottom: 0; width: 100%; height: 100%; pointer-events: none; }
        #instruction { 
            position: absolute; top: 30px; width: 100%; text-align: center; 
            color: white; font-size: 1rem; text-shadow: 0 0 10px var(--primary); 
            animation: pulse 2s infinite; pointer-events: auto; 
            background: rgba(0,0,0,0.5); padding: 5px 0;
        }
        @keyframes pulse { 0% {opacity:0.6;} 50% {opacity:1;} 100% {opacity:0.6;} }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px white; transition: 0.2s; }
        #joystick-area { position: absolute; bottom: 40px; left: 40px; width: 160px; height: 160px; background: rgba(255,255,255,0.05); border-radius: 50%; z-index: 200; display: flex; align-items: center; justify-content: center; pointer-events: auto; border: 2px solid rgba(255,255,255,0.1); }
        #joystick-knob { position: absolute; width: 50px; height: 50px; background: rgba(255, 133, 161, 0.8); border-radius: 50%; left: 55px; top: 55px; box-shadow: 0 0 15px var(--primary); pointer-events: none; }

        /* --- 3. VN 回憶對話與懸浮框 --- */
        #vn-screen { z-index: 100; cursor: pointer; background-color: #000; background-size: cover; background-position: center; transition: background-image 0.5s; }
        #sprite-container { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 80%; height: 80%; display: flex; justify-content: center; align-items: flex-end; pointer-events: none; }
        #character-sprite { height: 95%; transition: opacity 0.5s; opacity: 0; max-width: 100%; object-fit: contain; }
        
        #vn-summary-box {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 800px; background: rgba(0, 0, 0, 0.75);
            border-left: 4px solid var(--primary); border-right: 4px solid var(--primary);
            border-radius: 8px; padding: 15px 25px; box-sizing: border-box;
            color: rgba(255, 255, 255, 0.95); font-size: 1.1rem; line-height: 1.6;
            display: none; z-index: 101; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px); text-align: center; font-style: italic; white-space: pre-wrap;
        }

        #vn-dialog { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 900px; min-height: 160px; background: rgba(0, 0, 0, 0.85); border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 25px; box-sizing: border-box; color: white; -webkit-backdrop-filter: blur(5px); }
        #vn-text { font-size: 1.15rem; line-height: 1.6; white-space: pre-wrap; transition: 0.2s; }
        #vn-options { display: none; flex-direction: column; gap: 10px; margin-top: 15px; pointer-events: auto;}

        /* --- 4. 結算雷達圖畫面 --- */
        #result-screen { 
            background: radial-gradient(circle, #1a1a3a, #050510); 
            z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: flex-start; 
            padding: 30px 20px; box-sizing: border-box; overflow-y: hidden; cursor: pointer;
        }
        #chart-box { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; padding: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
            backdrop-filter: blur(10px); display:flex; justify-content:center;
            margin-top: 10px; z-index: 0;
        }
        #radarCanvas { max-width: 100%; height: auto; }
        
        /* 結算畫面的解說助手排版 */
        #result-sprite-container { 
            position: absolute; 
            bottom: 190px; 
            right: 10%; 
            height: 45%; 
            display: flex; 
            justify-content: flex-end; 
            align-items: flex-end; 
            pointer-events: none; 
            z-index: 1; 
        }
        #result-sprite { height: 100%; max-width: 100%; object-fit: contain; }
        
        #result-dialog { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 900px; min-height: 160px; background: rgba(0, 0, 0, 0.85); 
            border: 2px solid var(--mind); border-radius: 12px; padding: 25px; box-sizing: border-box; 
            color: white; -webkit-backdrop-filter: blur(5px); z-index: 2; 
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="flash-overlay"></div>

    <div id="audio-ui" style="position: fixed; top: 15px; right: 15px; z-index: 9999; display: none; gap: 10px; flex-wrap: wrap; justify-content: flex-end;">
        <button class="opt-btn" id="btn-skip" onclick="skipOpening(event)" style="padding: 8px 16px; font-size: 0.95rem; margin: 0; min-height: auto; display: none;">&gt;&gt;</button>
        <button class="opt-btn" id="btn-reset-hub" onclick="resetHubProgress(event)" style="padding: 8px 16px; font-size: 0.95rem; margin: 0; min-height: auto; display: none;">重新選擇</button>
        <button class="opt-btn" id="btn-restart" onclick="restartGame(event)" style="padding: 8px 16px; font-size: 0.95rem; margin: 0; min-height: auto; display: none;">從頭開始</button>
        <button class="opt-btn" id="btn-bgm" onclick="toggleBGM(event)" style="padding: 8px 16px; font-size: 0.95rem; margin: 0; min-height: auto;">🎵 BGM: 關</button>
        <button class="opt-btn" id="btn-sfx" onclick="toggleSFX(event)" style="padding: 8px 16px; font-size: 0.95rem; margin: 0; min-height: auto;">🔊 音效: 開</button>
    </div>

    <div id="setup-screen" class="screen" style="display: flex;">
        <h1 style="color:white; margin-bottom:50px; font-size: 2.5rem; text-shadow: 0 0 15px var(--primary); font-family: serif;">愛之語：回憶日記</h1>
        <div style="display:flex; gap:20px;">
            <button class="opt-btn" onclick="playSFX(); startGame('male')" style="text-align:center;">男主角</button>
            <button class="opt-btn" onclick="playSFX(); startGame('female')" style="text-align:center;">女主角</button>
        </div>
    </div>

    <div id="hub-screen" class="screen">
        <div id="scene">
            <div id="camera">
                <div id="world">
                    <script>
                        for(let i=0; i<12; i++) document.write(`<div class="wall" style="transform: rotateY(${i * 30}deg) translateZ(-1000px);"></div>`);
                    </script>
                    <div class="floor"></div><div class="ceiling"></div><div class="center-glow"></div>
                    <script>
                        const doorConfigs = [
                            { id: 0, rot: 0,   title: "回憶 1", sub: "圖書館", bg: "bg_library.png" },
                            { id: 1, rot: 72,  title: "回憶 2", sub: "練舞室", bg: "bg_dance_studio.png" },
                            { id: 2, rot: 144, title: "回憶 3", sub: "校園小徑", bg: "bg_campus_path.png" },
                            { id: 3, rot: 216, title: "回憶 4", sub: "宿舍", bg: "bg_dormitory.png" },
                            { id: 4, rot: 288, title: "回憶 5", sub: "中央廣場", bg: "bg_plaza.png" }
                        ];
                        
                        doorConfigs.forEach(cfg => {
                            document.write(`
                                <div class="door-frame" style="transform: rotateY(${cfg.rot}deg) translateZ(-980px) translateY(190px);">
                                    <div class="door-inside" id="door-inside-${cfg.id}"></div>
                                    <div class="door-flap" data-id="${cfg.id}" id="door-flap-${cfg.id}" style="background-image: url('${cfg.bg}'); background-size: cover; background-position: center;">
                                        <div class="door-overlay"></div>
                                        <div class="door-content">
                                            <span>${cfg.title}</span><br><span style="font-size:0.9rem; margin-top:10px;">${cfg.sub}</span>
                                        </div>
                                    </div>
                                </div>
                            `);
                        });
                    </script>
                </div>
            </div>
        </div>
        <div id="ui-layer">
            <div id="instruction">平板：滑動螢幕轉向 / 滑鼠點擊拖曳轉向、滾輪縮放 / 鍵盤WASD操控 </div>
            <div id="crosshair"></div>
            <div id="joystick-area"><div id="joystick-knob"></div></div>
        </div>
    </div>

    <div id="vn-screen" class="screen" onclick="handleVnClick()">
        <div id="vn-summary-box"></div> 
        <div id="sprite-container"><img id="character-sprite" src="" alt="立繪"></div>
        <div id="vn-dialog">
            <div id="vn-name" style="font-size: 1.3rem; font-weight: bold; margin-bottom: 10px;"></div>
            <div id="vn-text"></div>
            <div id="vn-options"></div>
        </div>
    </div>

    <div id="result-screen" class="screen" onclick="nextResultDialog()">
        <h1 style="color: #fff; font-family: serif; text-shadow: 0 0 15px var(--primary); margin: 0 0 5px 0; font-size: 2rem; position: relative; z-index: 0;">愛之語形狀・結晶</h1>
        <p style="color: rgba(255,255,255,0.6); margin: 0 0 10px 0; font-size: 1rem; position: relative; z-index: 0;">這是你在這段感情回憶中，靈魂深處最渴望被愛的方式。</p>
        
        <div id="chart-box"><canvas id="radarCanvas" width="400" height="360"></canvas></div>
        
        <div id="result-sprite-container">
            <img id="result-sprite" src="spirit.png" alt="日記精靈">
        </div>
        
        <div id="result-dialog">
            <div style="font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; color: var(--mind);">日記精靈</div>
            <div id="result-text" style="font-size: 1.15rem; line-height: 1.6; white-space: pre-wrap;"></div>
            <div id="result-options" style="display: none; flex-direction: column; gap: 10px; margin-top: 15px; pointer-events: auto;">
                <a href="https://trumpetken.github.io/love-language-game/" target="_blank" class="opt-btn" style="text-align: center; text-decoration: none; font-weight: bold; width: 100%; box-sizing: border-box;" onclick="event.stopPropagation();">接受任務</a>
            </div>
        </div>
    </div>

<script>
    // --- 遊戲全局狀態 ---
    let currentMode = 'SETUP'; 
    let playerGender = ''; let partnerSprite = ''; 
    let scores = { words:0, acts:0, gifts:0, time:0, touch:0 };
    let completedDoors = 0;

    // --- 音效與音樂系統變數 ---
    let bgmEnabled = false; // 預設關閉BGM
    let sfxEnabled = true;
    let currentBgm = null;

    function playSFX() {
        if (sfxEnabled) {
            let sfx = new Audio('se_click.wav'); // 修改為wav格式
            sfx.play().catch(err => console.log("SFX play error:", err));
        }
    }

    function toggleBGM(event) {
        if (event) event.stopPropagation();
        bgmEnabled = !bgmEnabled;
        let btn = document.getElementById('btn-bgm');
        if (bgmEnabled) {
            btn.innerHTML = "🎵 BGM: 開";
            if (currentBgm) {
                currentBgm.play().catch(err => console.log(err));
            } else {
                if (currentMode === 'VN' && vnIndex < currentVnLines.length && currentVnLines[vnIndex].bg === "dorm_night.png") {
                    currentBgm = new Audio('bgm_opening.mp3');
                    currentBgm.loop = true;
                    currentBgm.play().catch(err => console.log(err));
                } else {
                    currentBgm = new Audio('bgm_hub.mp3');
                    currentBgm.loop = true;
                    currentBgm.play().catch(err => console.log(err));
                }
            }
        } else {
            btn.innerHTML = "🎵 BGM: 關";
            if (currentBgm) currentBgm.pause();
        }
        playSFX();
    }

    function toggleSFX(event) {
        if (event) event.stopPropagation();
        sfxEnabled = !sfxEnabled;
        let btn = document.getElementById('btn-sfx');
        if (sfxEnabled) {
            btn.innerHTML = "🔊 音效: 開";
        } else {
            btn.innerHTML = "🔊 音效: 關";
        }
        playSFX();
    }

    // --- 控制鈕功能：跳過劇情 ---
    function skipOpening(event) {
        if (event) event.stopPropagation();
        playSFX();
        clearInterval(typeTimer);
        document.getElementById('vn-screen').style.display = 'none';
        
        if (currentBgm) currentBgm.pause();
        if (bgmEnabled) {
            currentBgm = new Audio('bgm_hub.mp3');
            currentBgm.loop = true;
            currentBgm.play().catch(e => console.log(e));
        }

        document.getElementById('btn-skip').style.display = 'none';
        document.getElementById('btn-reset-hub').style.display = 'block';
        document.getElementById('hub-screen').style.display = 'block';
        currentMode = 'HUB';
    }

    // --- 控制鈕功能：重新選擇進度 ---
    function resetHubProgress(event) {
        if (event) event.stopPropagation();
        playSFX();
        scores = { words:0, acts:0, gifts:0, time:0, touch:0 };
        completedDoors = 0;

        for (let i = 0; i < 5; i++) {
            let flap = document.getElementById('door-flap-' + i);
            let inside = document.getElementById('door-inside-' + i);
            if (flap) flap.classList.remove('open', 'completed');
            if (flap) flap.style.transform = 'rotateY(0deg)';
            if (inside) inside.style.opacity = '0';
        }

        if (currentMode === 'VN' || currentMode === 'TRANSITION') {
            clearInterval(typeTimer);
            document.getElementById('vn-screen').style.display = 'none';
            document.getElementById('vn-summary-box').style.display = 'none';
            document.getElementById('hub-screen').style.display = 'block';
        }

        cameraYaw = 0; zoomLevel = 0;
        document.getElementById('camera').style.transform = `translateZ(0px)`;
        document.getElementById('world').style.transform = `rotateY(0deg)`;
        currentMode = 'HUB';
    }

    // --- 控制鈕功能：從頭開始 ---
    function restartGame(event) {
        if (event) event.stopPropagation();
        playSFX();
        if (currentBgm) { currentBgm.pause(); currentBgm = null; }

        scores = { words:0, acts:0, gifts:0, time:0, touch:0 };
        completedDoors = 0;
        clearInterval(typeTimer);
        clearInterval(resultTypeTimer);

        for (let i = 0; i < 5; i++) {
            let flap = document.getElementById('door-flap-' + i);
            let inside = document.getElementById('door-inside-' + i);
            if (flap) flap.classList.remove('open', 'completed');
            if (flap) flap.style.transform = 'rotateY(0deg)';
            if (inside) inside.style.opacity = '0';
        }

        cameraYaw = 0; zoomLevel = 0;
        document.getElementById('camera').style.transform = `translateZ(0px)`;
        document.getElementById('world').style.transform = `rotateY(0deg)`;

        document.getElementById('hub-screen').style.display = 'none';
        document.getElementById('vn-screen').style.display = 'none';
        document.getElementById('vn-summary-box').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('audio-ui').style.display = 'none';

        document.getElementById('setup-screen').style.display = 'flex';
        currentMode = 'SETUP';
    }

    const scenes = [
        { id:0, name: "圖書館", color: "#4a90e2", bg: "bg_library.png", summary: "時間回到了大一上的期末考週，我們一起到圖書館讀書，然而我卻盯著筆記本發呆，壓力大到快哭出來了。", question: "這個時候，對方做些什麼會讓我感到被愛?", opts: [ { t: "買杯熱咖啡給我", type: "acts" }, { t: "寫小紙條鼓勵我", type: "words" }, { t: "陪我去外面走走散心", type: "time" } ] },
        { id:1, name: "練舞室", color: "#e24a90", bg: "bg_dance_studio.png", summary: "時間回到了我剛結束社團成發，因為表現失誤正在後門自責。他看到了我失落的表情。", question: "這個時候，我希望對方注意到我的狀態...", opts: [ { t: "再給我一個大大的擁抱", type: "touch" }, { t: "並默默陪伴我", type: "time" }, { t: "並說些安慰和鼓勵的話", type: "words" } ] },
        { id:2, name: "校園小徑", color: "#4ae290", bg: "bg_campus_path.png", summary: "時間回到了我們兩人昨晚吵完架，隔天並肩走在校園小徑，然而兩人還在冷戰沉默不語。", question: "這個時候，我希望對方...", opts: [ { t: "主動開口道歉", type: "words" }, { t: "主動牽起我的手", type: "touch" }, { t: "從我的蝦皮購物車中挑一個我想要買的東西買給我", type: "gifts" } ] },
        { id:3, name: "宿舍", color: "#e2b84a", bg: "bg_dormitory.png", summary: "時間回到那天是兩人交往百日紀念日。", question: "這個時候，我希望對方...", opts: [ { t: "能花時間陪陪我就好", type: "time" }, { t: "精心準備卡片送給我", type: "gifts" }, { t: "精心安排旅遊帶我出去玩", type: "acts" } ] },
        { id:4, name: "中央廣場", color: "#904ae2", bg: "bg_plaza.png", summary: "時間回到我努力了許久，圓滿達成了的目標。", question: "這個時候，我希望對方...", opts: [ { t: "送我一個我想要的禮物", type: "gifts" }, { t: "親自準備一頓大餐請我吃", type: "acts" }, { t: "緊緊擁抱轉圈", type: "touch" } ] }
    ];

    function startGame(gender) {
        playerGender = gender;
        document.getElementById('setup-screen').style.display = 'none';
        partnerSprite = (playerGender === 'male') ? 'girl.png' : 'boy.png';

        document.getElementById('audio-ui').style.display = 'flex';
        document.getElementById('btn-skip').style.display = 'block';
        document.getElementById('btn-reset-hub').style.display = 'none';
        document.getElementById('btn-restart').style.display = 'block';

        if (bgmEnabled) {
            currentBgm = new Audio('bgm_opening.mp3');
            currentBgm.loop = true;
            currentBgm.play().catch(e => console.log("BGM 播放受限:", e));
        }

        startVnSequence([
            { name: "我", text: "唉...明明我已經這麼努力付出了，最後他還是選擇跟我分手...", bg: "dorm_night.png", sprite: "" },
            { name: "我", text: "我到底做錯了什麼...", bg: "dorm_night.png", sprite: "" },
            { name: "日記本", text: "（桌上的日記本突然發出微弱的光芒...）", bg: "dorm_night.png", sprite: "" },
            { name: "???", text: "哎呀呀，這股心碎的味道真是讓人鼻酸。讓我來幫助你吧~", bg: "dorm_night.png", sprite: "spirit.png" },
            { name: "我", text: "咦?你是誰?", bg: "dorm_night.png", sprite: "spirit.png" },
            { name: "???", text: "你好啊，回憶錄的主人。我是你每天認真寫日記而誕生的日記精靈。", bg: "dorm_night.png", sprite: "spirit.png" },
            { name: "我", text: "這...日記精靈?哈哈哈...我肯定在做夢。", bg: "dorm_night.png", sprite: "spirit.png" },
            { name: "日記精靈", text: "很難想像嗎?就想像成你的個人Gemini就好啦。", bg: "dorm_night.png", sprite: "spirit.png" },
            { name: "我", text: "好啊，精靈，那你知道為什麼他要跟我分手嗎?", bg: "dorm_night.png", sprite: "spirit.png" },
            { name: "日記精靈", text: "根據你的日記內容，我發現你和他的「愛之語」不同，所以才會經常吵架。", bg: "dorm_night.png", sprite: "spirit.png" },
            { name: "我", text: "什麼是「愛之語」?", bg: "dorm_night.png", sprite: "spirit.png" },
            { name: "日記精靈", text: "每個人喜歡被愛人對待的方式都不同，就像說著不同語言一樣。", bg: "dorm_night.png", sprite: "spirit.png" },
            { name: "日記精靈", text: "若能了解彼此的「愛之語」，用對方喜歡的愛之語來對待他，就能增進兩人的關係唷。", bg: "dorm_night.png", sprite: "spirit.png" },
            { name: "日記精靈", text: "我們先來了解你的愛之語吧。這裡是你的「記憶樞紐」。", bg: "dorm_night.png", sprite: "spirit.png" },
            { name: "日記精靈", text: "去推開周圍的發光門把，重新體驗那些回憶吧。", bg: "dorm_night.png", sprite: "spirit.png", isLast: true, highlight: true }
        ], () => {
            if (currentBgm) currentBgm.pause();
            if (bgmEnabled) {
                currentBgm = new Audio('bgm_hub.mp3');
                currentBgm.loop = true;
                currentBgm.play().catch(e => console.log("BGM 播放受限:", e));
            }

            document.getElementById('btn-skip').style.display = 'none';
            document.getElementById('btn-reset-hub').style.display = 'block';

            document.getElementById('hub-screen').style.display = 'block';
            currentMode = 'HUB';
        });
    }

    // --- 全景縮放與智慧防誤觸點擊系統 ---
    let cameraYaw = 0; let zoomLevel = 0; 
    let joyTouchId = null, lookTouchId = null; 
    let joyMoveY = 0; let lastLookX = 0;
    let clickStartX = 0, clickStartY = 0; let potentialDoorClick = null;

    function handleJoy(clientX, centerY) {
        const rect = document.getElementById('joystick-area').getBoundingClientRect();
        const dx = clientX - (rect.left + rect.width / 2); const dy = centerY - (rect.top + rect.height / 2);
        const dist = Math.min(40, Math.hypot(dx, dy)); const ang = Math.atan2(dy, dx);
        const knobX = Math.cos(ang) * dist; const knobY = Math.sin(ang) * dist;
        document.getElementById('joystick-knob').style.transform = `translate(${knobX}px, ${knobY}px)`;
        joyMoveY = (knobY / 40) * 15; 
    }

    window.addEventListener('touchstart', (e) => {
        if (currentMode !== 'HUB') return;
        for (let i = 0; i < e.changedTouches.length; i++) {
            let t = e.changedTouches[i];
            if (t.target.closest('#joystick-area')) { 
                if (joyTouchId === null) { joyTouchId = t.identifier; handleJoy(t.clientX, t.clientY); } 
            } else { 
                if (lookTouchId === null) { 
                    lookTouchId = t.identifier; lastLookX = t.clientX; 
                    let flap = t.target.closest('.door-flap');
                    if (flap && !flap.classList.contains('completed')) {
                        potentialDoorClick = flap.getAttribute('data-id');
                        clickStartX = t.clientX; clickStartY = t.clientY;
                    } else { potentialDoorClick = null; }
                } 
            }
        }
    }, {passive: false});

    window.addEventListener('touchmove', (e) => {
        if (currentMode !== 'HUB') return;
        for (let i = 0; i < e.changedTouches.length; i++) {
            let t = e.changedTouches[i];
            if (t.identifier === joyTouchId) { e.preventDefault(); handleJoy(t.clientX, t.clientY); } 
            else if (t.identifier === lookTouchId) { e.preventDefault(); cameraYaw += (t.clientX - lastLookX) * 0.2; lastLookX = t.clientX; }
        }
    }, {passive: false});

    const endTouch = (e) => {
        // 移除模式阻擋，確保手指離開時狀態被徹底清空，防止搖桿卡死
        for (let i = 0; i < e.changedTouches.length; i++) {
            let t = e.changedTouches[i];
            if (t.identifier === joyTouchId) { 
                joyTouchId = null; joyMoveY = 0; document.getElementById('joystick-knob').style.transform = 'translate(0,0)'; 
            }
            if (t.identifier === lookTouchId) { 
                if (potentialDoorClick !== null && currentMode === 'HUB') {
                    let dist = Math.hypot(t.clientX - clickStartX, t.clientY - clickStartY);
                    if (dist < 10) openDoor(parseInt(potentialDoorClick));
                }
                potentialDoorClick = null;
                lookTouchId = null; 
            }
        }
    };
    window.addEventListener('touchend', endTouch); window.addEventListener('touchcancel', endTouch);

    let isKeyW = false, isKeyS = false; let isKeyA = false, isKeyD = false; 
    window.addEventListener('keydown', (e) => { 
        if(currentMode !== 'HUB') return; 
        let k = e.key.toLowerCase(); 
        if (k==='w'||e.key==='ArrowUp') isKeyW = true; 
        if (k==='s'||e.key==='ArrowDown') isKeyS = true; 
        if (k==='a'||e.key==='ArrowLeft') isKeyA = true; 
        if (k==='d'||e.key==='ArrowRight') isKeyD = true;
    });
    window.addEventListener('keyup', (e) => { 
        // 移除模式阻擋，確保按鍵放開時變數正確歸零
        let k = e.key.toLowerCase(); 
        if (k==='w'||e.key==='ArrowUp') isKeyW = false; 
        if (k==='s'||e.key==='ArrowDown') isKeyS = false; 
        if (k==='a'||e.key==='ArrowLeft') isKeyA = false; 
        if (k==='d'||e.key==='ArrowRight') isKeyD = false;
    });

    let isMouseDown = false;
    window.addEventListener('mousedown', (e) => {
        if (currentMode === 'HUB' && !e.target.closest('#joystick-area')) {
            isMouseDown = true; lastLookX = e.clientX;
            let flap = e.target.closest('.door-flap');
            if (flap && !flap.classList.contains('completed')) {
                potentialDoorClick = flap.getAttribute('data-id');
                clickStartX = e.clientX; clickStartY = e.clientY;
            } else { potentialDoorClick = null; }
        }
    });
    window.addEventListener('mousemove', (e) => { if (currentMode === 'HUB' && isMouseDown) { cameraYaw += (e.clientX - lastLookX) * 0.2; lastLookX = e.clientX; } });
    window.addEventListener('mouseup', (e) => { 
        isMouseDown = false; 
        if (potentialDoorClick !== null && currentMode === 'HUB') {
            let dist = Math.hypot(e.clientX - clickStartX, e.clientY - clickStartY);
            if (dist < 10) openDoor(parseInt(potentialDoorClick));
        }
        potentialDoorClick = null;
    });
    window.addEventListener('mouseleave', () => { isMouseDown = false; potentialDoorClick = null; });

    window.addEventListener('wheel', (e) => {
        if (currentMode === 'HUB') {
            if (e.deltaY < 0) { zoomLevel += 30; } else { zoomLevel -= 30; }
            zoomLevel = Math.max(0, Math.min(750, zoomLevel));
            document.getElementById('camera').style.transform = `translateZ(${zoomLevel}px)`;
        }
    });

    // --- 遊戲背景核心引擎 (全域獨立，確保不會卡死) ---
    function gameLoop() {
        requestAnimationFrame(gameLoop); // 永久運行
        if (currentMode === 'HUB') {
            if (isKeyA) cameraYaw += 2; if (isKeyD) cameraYaw -= 2;
            if (isKeyW) zoomLevel += 15; if (isKeyS) zoomLevel -= 15;
            if (joyMoveY !== 0) zoomLevel -= joyMoveY;
            zoomLevel = Math.max(0, Math.min(750, zoomLevel));

            document.getElementById('camera').style.transform = `translateZ(${zoomLevel}px)`;
            document.getElementById('world').style.transform = `rotateY(${-cameraYaw}deg)`;
        }
    }
    requestAnimationFrame(gameLoop); // 開啟全域遊戲迴圈

    function openDoor(index) {
        let flap = document.getElementById('door-flap-' + index);
        let inside = document.getElementById('door-inside-' + index);
        if (flap.classList.contains('open') || flap.classList.contains('completed')) return;

        playSFX();

        currentMode = 'TRANSITION'; currentSceneIndex = index;
        flap.classList.add('open'); flap.style.transform = 'rotateY(100deg)'; inside.style.opacity = '1';

        setTimeout(() => {
            let flash = document.getElementById('flash-overlay');
            flash.style.display = 'block'; setTimeout(() => flash.style.opacity = '1', 10);
            
            setTimeout(() => {
                document.getElementById('hub-screen').style.display = 'none';
                flash.style.opacity = '0'; setTimeout(() => flash.style.display = 'none', 500);

                let scene = scenes[index];
                startVnSequence([
                    { name: "回憶：" + scene.name, text: scene.summary, color: scene.color, bg: scene.bg, sprite: "" },
                    { name: "回憶：" + scene.name, text: scene.question, options: scene.opts, color: scene.color, bg: scene.bg, sprite: partnerSprite, showSummaryBox: scene.summary }
                ], () => {
                    document.getElementById('hub-screen').style.display = 'block';
                    currentMode = 'HUB';
                    flap.style.transform = 'rotateY(0deg)'; inside.style.opacity = '0';
                    flap.classList.add('completed');
                    
                    completedDoors++;
                    if(completedDoors === 5) {
                        currentMode = 'END';
                        let finalFlash = document.getElementById('flash-overlay');
                        finalFlash.style.display = 'block'; finalFlash.style.opacity = '1';
                        setTimeout(() => {
                            document.getElementById('hub-screen').style.display = 'none';
                            showResultChart(); 
                            finalFlash.style.opacity = '0'; setTimeout(() => finalFlash.style.display = 'none', 500);
                        }, 600);
                    }
                });
            }, 500);
        }, 1200);
    }

    let currentVnLines = [], vnIndex = 0, isTyping = false, typeTimer = null, onVnComplete = null;

    function startVnSequence(lines, callback) {
        currentMode = 'VN';
        document.getElementById('vn-screen').style.display = 'block';
        currentVnLines = lines; vnIndex = 0; onVnComplete = callback;
        document.getElementById('vn-summary-box').style.display = 'none';
        playVnLine();
    }

    function playVnLine() {
        let line = currentVnLines[vnIndex];
        let textEl = document.getElementById('vn-text'), nameEl = document.getElementById('vn-name');
        let vnContainer = document.getElementById('vn-screen'), spriteEl = document.getElementById('character-sprite');
        let summaryBox = document.getElementById('vn-summary-box');
        
        document.getElementById('vn-options').style.display = "none";
        nameEl.innerHTML = line.name; textEl.innerHTML = "";
        
        let finalReportText = line.text;
        if (playerGender === 'male') finalReportText = finalReportText.replace(/他/g, '她');

        if (line.showSummaryBox) {
            let boxText = line.showSummaryBox;
            if (playerGender === 'male') boxText = boxText.replace(/他/g, '她');
            summaryBox.innerHTML = boxText;
            summaryBox.style.display = 'block';
        } else {
            summaryBox.style.display = 'none';
        }

        if (line.highlight) { textEl.style.color = "var(--gold)"; textEl.style.fontWeight = "bold"; } 
        else { textEl.style.color = "white"; textEl.style.fontWeight = "normal"; }

        if (line.bg) { vnContainer.style.backgroundImage = `url('${line.bg}')`; vnContainer.style.backgroundColor = "transparent"; } 
        else { vnContainer.style.backgroundImage = "none"; vnContainer.style.backgroundColor = line.isMind ? 'rgba(0,0,0,0.9)' : (line.color || '#222'); }

        if (line.sprite) { spriteEl.src = line.sprite; spriteEl.style.opacity = '1'; } 
        else { spriteEl.style.opacity = '0'; }

        nameEl.style.color = line.isMind ? '#a29bfe' : (line.color || '#ff85a1');
        document.getElementById('vn-dialog').style.borderColor = line.isMind ? '#a29bfe' : 'rgba(255,255,255,0.2)';

        isTyping = true; let charIndex = 0; clearInterval(typeTimer);
        typeTimer = setInterval(() => {
            textEl.innerHTML += finalReportText.charAt(charIndex); charIndex++;
            if (charIndex >= finalReportText.length) { 
                clearInterval(typeTimer); isTyping = false; 
                if (line.options) showVnOptions(line.options); 
            }
        }, 40);
    }

    function handleVnClick() {
        if (currentMode !== 'VN') return;
        playSFX();
        if (isTyping) { 
            clearInterval(typeTimer); 
            let fullTxt = currentVnLines[vnIndex].text;
            // 已修復筆誤
            if (playerGender === 'male') fullTxt = fullTxt.replace(/他/g, '她');
            document.getElementById('vn-text').innerHTML = fullTxt; 
            isTyping = false; 
            if (currentVnLines[vnIndex].options) showVnOptions(currentVnLines[vnIndex].options); 
            return; 
        }
        if (currentVnLines[vnIndex].options) return;

        vnIndex++;
        if (vnIndex < currentVnLines.length) playVnLine();
        else { 
            document.getElementById('vn-screen').style.display = 'none'; 
            document.getElementById('vn-summary-box').style.display = 'none';
            if(onVnComplete) onVnComplete(); 
        }
    }

    let selectedOption = null;
    function showVnOptions(opts) {
        let optCont = document.getElementById('vn-options');
        optCont.innerHTML = ""; optCont.style.display = "flex";
        selectedOption = null;

        let buttons = [];
        opts.forEach(o => {
            let btn = document.createElement('button'); btn.className = "opt-btn"; 
            let optionLabel = o.t;
            if (playerGender === 'male') optionLabel = optionLabel.replace(/他/g, '她');
            btn.innerHTML = optionLabel;
            
            btn.onclick = (e) => {
                e.stopPropagation();
                playSFX();
                
                buttons.forEach(b => {
                    b.style.background = "rgba(0,0,0,0.7)";
                    b.style.borderColor = "rgba(255,255,255,0.3)";
                });
                
                btn.style.background = "var(--primary)";
                btn.style.borderColor = "var(--gold)";
                
                selectedOption = o;
                confirmBtn.style.display = "block";
            };
            optCont.appendChild(btn);
            buttons.push(btn);
        });

        let confirmBtn = document.createElement('button');
        confirmBtn.className = "opt-btn";
        confirmBtn.innerHTML = "確定選擇";
        confirmBtn.style.background = "rgba(255,215,0,0.2)";
        confirmBtn.style.borderColor = "var(--gold)";
        confirmBtn.style.color = "var(--gold)";
        confirmBtn.style.fontWeight = "bold";
        confirmBtn.style.textAlign = "center";
        confirmBtn.style.marginTop = "15px";
        confirmBtn.style.display = "none"; 
        
        confirmBtn.onclick = (e) => {
            e.stopPropagation();
            playSFX();
            if (selectedOption) {
                scores[selectedOption.type]++; 
                document.getElementById('vn-screen').style.display = 'none'; 
                document.getElementById('vn-summary-box').style.display = 'none';
                if(onVnComplete) onVnComplete();
            }
        };
        optCont.appendChild(confirmBtn);
    }

    // --- 5. 結算雷達圖系統 ---
    let resultLines = [];
    let currentResultIndex = 0;
    let isResultTyping = false;
    let resultTypeTimer = null;

    function showResultChart() {
        document.getElementById('result-screen').style.display = 'flex';
        // 結算隱藏重新選擇，只留從頭開始
        document.getElementById('btn-reset-hub').style.display = 'none';
        
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        const keys = ['words', 'acts', 'gifts', 'time', 'touch'];
        const chLabels = ['肯定的言詞', '服務的行動', '真誠的禮物', '精心的時刻', '身體的接觸'];
        const centerX = 200, centerY = 180, maxRadius = 100, totalSides = 5;

        ctx.clearRect(0,0,400,360);
        for (let level = 1; level <= 3; level++) {
            ctx.beginPath(); let r = (maxRadius / 3) * level;
            for (let i = 0; i < totalSides; i++) {
                let angle = i * (2 * Math.PI / totalSides) - Math.PI / 2;
                let x = centerX + r * Math.cos(angle); let y = centerY + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath(); ctx.strokeStyle = "rgba(255, 255, 255, 0.15)"; ctx.lineWidth = 1; ctx.stroke();
            ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.font = "10px sans-serif";
            ctx.fillText(level, centerX + 4, centerY - (maxRadius / 3) * level + 10);
        }

        ctx.beginPath();
        for (let i = 0; i < totalSides; i++) {
            let angle = i * (2 * Math.PI / totalSides) - Math.PI / 2;
            ctx.moveTo(centerX, centerY); ctx.lineTo(centerX + maxRadius * Math.cos(angle), centerY + maxRadius * Math.sin(angle));
        }
        ctx.strokeStyle = "rgba(255, 255, 255, 0.1)"; ctx.stroke();

        ctx.beginPath();
        for (let i = 0; i < totalSides; i++) {
            let score = scores[keys[i]] || 0; let r = (maxRadius / 3) * score; 
            let angle = i * (2 * Math.PI / totalSides) - Math.PI / 2;
            let x = centerX + r * Math.cos(angle); let y = centerY + r * Math.sin(angle);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = "rgba(255, 133, 161, 0.5)"; ctx.fill();
        ctx.strokeStyle = "rgba(255, 133, 161, 0.9)"; ctx.lineWidth = 3;
        ctx.shadowColor = "rgba(255, 133, 161, 0.5)"; ctx.shadowBlur = 10; ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px Microsoft JhengHei, sans-serif"; ctx.textAlign = "center";
        for (let i = 0; i < totalSides; i++) {
            let angle = i * (2 * Math.PI / totalSides) - Math.PI / 2;
            let x = centerX + (maxRadius + 25) * Math.cos(angle); let y = centerY + (maxRadius + 18) * Math.sin(angle);
            if (Math.cos(angle) > 0.1) ctx.textAlign = "left"; else if (Math.cos(angle) < -0.1) ctx.textAlign = "right"; else ctx.textAlign = "center";
            ctx.fillText(chLabels[i], x, y + 4);
        }

        let maxScore = -1; let highestLang = '';
        keys.forEach((k, idx) => { if (scores[k] > maxScore) { maxScore = scores[k]; highestLang = chLabels[idx]; } });
        
        const explanations = {
            '肯定的言詞': "對你而言，言語具有極高的精神重量。一句真誠的誇獎、道歉或『你已經很棒了』，能瞬間填滿你的安全感。",
            '服務的行動': "你深信『做的比說的重要』。你渴望從對方實質的體貼與分擔中，確認自己是被深愛與照顧著的。",
            '真誠的禮物': "禮物對你來說不是物質利益，而是『被牽掛的視覺證明』。不論是精心準備的卡片、還是從蝦皮購物車裡挑選的小驚喜，代表著對方在不見面時，心裡依然惦記著你。",
            '精心的時刻': "你最渴望的是『全然的陪伴』。默默的並肩、專注的聊天或一起出外散心。你無法忍受心不在焉的敷衍，只有雙方眼神交會、時間專屬於彼此的當下，你才能感受到愛的流動。",
            '身體的接觸': "對你來說，肢體的溫度勝過千言萬語。一個緊緊的擁抱、冷戰時主動牽起的手、或是開心的旋轉，這種真實的觸覺接觸，是你確認兩人靈魂依然緊密相連的核心途徑。"
        };

        resultLines = [
            `你在這段感情的回憶拼圖中，顯現出對【${highestLang}】的強烈渴望。`,
            explanations[highestLang],
            `除了了解自己的愛之語，你還要學會辨識別人的愛之語唷！接下來你的任務，如果你選擇接受的話，請找到你身邊的夥伴，猜對他的愛之語吧。`
        ];
        
        currentResultIndex = 0;
        playResultLine();
    }

    function playResultLine() {
        let line = resultLines[currentResultIndex];
        let textEl = document.getElementById('result-text');
        document.getElementById('result-options').style.display = "none";

        isResultTyping = true; let charIndex = 0; clearInterval(resultTypeTimer);
        textEl.innerHTML = ""; 
        
        resultTypeTimer = setInterval(() => {
            textEl.innerHTML += line.charAt(charIndex); charIndex++;
            if (charIndex >= line.length) { 
                clearInterval(resultTypeTimer); isResultTyping = false; 
                if (currentResultIndex === resultLines.length - 1) {
                    document.getElementById('result-options').style.display = "flex";
                }
            }
        }, 40);
    }

    function nextResultDialog() {
        if (currentMode !== 'END') return;
        playSFX();
        if (isResultTyping) { 
            clearInterval(resultTypeTimer); 
            document.getElementById('result-text').innerHTML = resultLines[currentResultIndex]; 
            isResultTyping = false; 
            if (currentResultIndex === resultLines.length - 1) {
                document.getElementById('result-options').style.display = "flex";
            }
            return; 
        }
        
        if (currentResultIndex < resultLines.length - 1) {
            currentResultIndex++;
            playResultLine();
        }
    }
</script>
